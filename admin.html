<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorted. Admin</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            font-size: 13px;
        }

        /* Login */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 32px;
            width: 320px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .login-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }

        .login-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .login-input:focus {
            outline: none;
            border-color: #4285f4;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #3367d6;
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .login-error {
            color: #d93025;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #ddd;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
        }

        .search-input {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            width: 200px;
        }

        .search-input:focus {
            outline: none;
            border-color: #4285f4;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .save-status {
            font-size: 12px;
            color: #666;
        }

        .save-status.saving {
            color: #f9ab00;
        }

        .save-status.saved {
            color: #34a853;
        }

        .save-status.error {
            color: #d93025;
        }

        .logout-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: #666;
        }

        .logout-btn:hover {
            background: #f5f5f5;
            color: #333;
        }

        /* Warning Banner */
        .warning-banner {
            background: #fef7e0;
            border-bottom: 1px solid #f9ab00;
            padding: 10px 16px;
            color: #b06000;
            font-weight: 500;
            display: none;
        }

        .warning-banner.show {
            display: block;
        }

        /* Spreadsheet */
        .spreadsheet-container {
            overflow: auto;
            height: calc(100vh - 100px);
        }

        table {
            border-collapse: collapse;
            width: max-content;
            min-width: 100%;
            background: white;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 8px 10px;
            height: 32px;
            white-space: nowrap;
        }

        th {
            background: #f8f9fa;
            font-weight: 500;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Frozen columns */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            z-index: 5;
            background: #f8f9fa;
            border-right: 2px solid #ccc;
        }

        th:first-child {
            z-index: 15;
        }

        th:nth-child(2),
        td:nth-child(2) {
            position: sticky;
            left: 40px;
            z-index: 4;
            background: inherit;
            border-right: 2px solid #ccc;
        }

        th:nth-child(2) {
            z-index: 14;
            background: #f8f9fa;
        }

        /* Row number column */
        .row-num {
            width: 40px;
            min-width: 40px;
            text-align: center;
            color: #666;
            cursor: pointer;
            user-select: none;
        }

        .row-num:hover {
            background: #e8f0fe !important;
        }

        tr.selected .row-num {
            background: #4285f4 !important;
            color: white;
        }

        /* Row states */
        tr.past td {
            background: #f5f5f5;
            color: #888;
        }

        tr.today td {
            background: #fffde7;
        }

        tr.upcoming td {
            background: white;
        }

        tr.selected td {
            background: #e8f0fe !important;
        }

        /* Clickable rows */
        tr[data-id] {
            cursor: pointer;
        }

        tr[data-id]:hover td {
            background: #f0f7ff !important;
        }

        tr[data-id].selected:hover td {
            background: #e8f0fe !important;
        }

        /* Cells */
        td.date-cell {
            min-width: 100px;
        }

        td.difficulty-cell {
            min-width: 80px;
        }

        td.author-cell {
            min-width: 100px;
        }

        td.category-cell {
            min-width: 140px;
        }

        td.words-cell {
            min-width: 220px;
            text-transform: uppercase;
        }

        /* Category colors */
        th.yellow, td.yellow { background: #fff9c4; }
        th.green, td.green { background: #c8e6c9; }
        th.blue, td.blue { background: #b3e5fc; }
        th.purple, td.purple { background: #e1bee7; }

        tr.past td.yellow { background: #f5f5dc; }
        tr.past td.green { background: #e0e0d0; }
        tr.past td.blue { background: #d8e8f0; }
        tr.past td.purple { background: #e8dce8; }

        tr.today td.yellow { background: #fff59d; }
        tr.today td.green { background: #a5d6a7; }
        tr.today td.blue { background: #81d4fa; }
        tr.today td.purple { background: #ce93d8; }

        tr:hover td.yellow { background: #fff176 !important; }
        tr:hover td.green { background: #81c784 !important; }
        tr:hover td.blue { background: #4fc3f7 !important; }
        tr:hover td.purple { background: #ba68c8 !important; }

        /* Delete confirmation */
        .delete-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #ddd;
            padding: 12px 16px;
            display: none;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
            z-index: 200;
        }

        .delete-bar.show {
            display: flex;
        }

        .delete-bar-text {
            color: #d93025;
            font-weight: 500;
        }

        .delete-bar-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #ddd;
            background: white;
        }

        .btn:hover {
            background: #f5f5f5;
        }

        .btn-danger {
            background: #d93025;
            color: white;
            border-color: #d93025;
        }

        .btn-danger:hover {
            background: #c5221f;
        }

        .btn-primary {
            background: #4285f4;
            color: white;
            border-color: #4285f4;
        }

        .btn-primary:hover {
            background: #3367d6;
        }

        .btn-primary:disabled {
            background: #a0c4ff;
            border-color: #a0c4ff;
            cursor: not-allowed;
        }

        /* Add row button */
        .add-row-container {
            padding: 8px 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .add-row-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: #f8f9fa;
            border: 1px dashed #ccc;
            border-radius: 4px;
            color: #666;
            font-size: 13px;
            cursor: pointer;
        }

        .add-row-btn:hover {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #4285f4;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* Edit Panel */
        .panel-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .panel-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .edit-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 500px;
            max-width: 100vw;
            background: white;
            box-shadow: -4px 0 20px rgba(0,0,0,0.15);
            z-index: 301;
            transform: translateX(100%);
            transition: transform 0.25s ease-out;
            display: flex;
            flex-direction: column;
        }

        .panel-overlay.open .edit-panel {
            transform: translateX(0);
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
        }

        .panel-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
            line-height: 1;
        }

        .panel-close:hover {
            color: #333;
        }

        .panel-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .panel-footer {
            padding: 16px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }

        .form-select:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            line-height: 1.5;
            resize: vertical;
            min-height: 380px;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        .form-textarea.error {
            border-color: #d93025;
            box-shadow: 0 0 0 2px rgba(217, 48, 37, 0.2);
        }

        .form-hint {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
        }

        .panel-error {
            background: #fce8e6;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            padding: 12px;
            color: #c5221f;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .panel-error.show {
            display: block;
        }

        .panel-error ul {
            margin: 8px 0 0 20px;
            padding: 0;
        }

        .panel-error li {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h1 class="login-title">Sorted. Admin</h1>
            <input type="password" id="passwordInput" class="login-input" placeholder="Password" autofocus>
            <button id="loginBtn" class="login-btn">Login</button>
            <p id="loginError" class="login-error">Incorrect password</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" style="display: none;">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <span class="header-title">Puzzle Manager</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Search...">
            </div>
            <div class="header-right">
                <span id="saveStatus" class="save-status"></span>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>

        <!-- Warning Banner -->
        <div id="warningBanner" class="warning-banner"></div>

        <!-- Spreadsheet -->
        <div class="spreadsheet-container">
            <table id="spreadsheet">
                <thead>
                    <tr>
                        <th class="row-num">#</th>
                        <th style="cursor:pointer" data-sort="date">Date</th>
                        <th>Difficulty</th>
                        <th class="yellow">Yellow Category</th>
                        <th class="yellow">Yellow Words</th>
                        <th class="green">Green Category</th>
                        <th class="green">Green Words</th>
                        <th class="blue">Blue Category</th>
                        <th class="blue">Blue Words</th>
                        <th class="purple">Purple Category</th>
                        <th class="purple">Purple Words</th>
                        <th>Author</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="12" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Add Row -->
        <div class="add-row-container">
            <button id="addRowBtn" class="add-row-btn">+ Add puzzle</button>
        </div>

        <!-- Delete Bar -->
        <div id="deleteBar" class="delete-bar">
            <span id="deleteText" class="delete-bar-text"></span>
            <div class="delete-bar-actions">
                <button id="cancelDeleteBtn" class="btn">Cancel</button>
                <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <!-- Edit Panel -->
    <div id="panelOverlay" class="panel-overlay">
        <div class="edit-panel">
            <div class="panel-header">
                <span id="panelTitle" class="panel-title">Edit Puzzle</span>
                <button id="panelClose" class="panel-close">&times;</button>
            </div>
            <div class="panel-body">
                <div id="panelError" class="panel-error"></div>

                <div class="form-group">
                    <label class="form-label">Date</label>
                    <input type="date" id="panelDate" class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label">Difficulty</label>
                    <select id="panelDifficulty" class="form-select">
                        <option value="">-- Select --</option>
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                        <option value="very_hard">Very Hard</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Categories (JSON)</label>
                    <textarea id="panelCategories" class="form-textarea" spellcheck="false"></textarea>
                    <p class="form-hint">Each category needs: title, 4 words, and difficulty (1-4). Words will be auto-uppercased.</p>
                </div>
            </div>
            <div class="panel-footer">
                <button id="panelCancel" class="btn">Cancel</button>
                <button id="panelSave" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script>
        // ===== DEBUG =====
        const DEBUG = false;
        function debugLog(...args) { if (DEBUG) console.log(...args); }

        // ===== STATE =====
        let adminToken = null;
        let puzzles = [];
        let selectedRowId = null;
        let sortAsc = true;
        let searchTerm = '';
        let editingPuzzleId = null; // null = new puzzle, string = editing existing

        // ===== DOM =====
        const loginOverlay = document.getElementById('loginOverlay');
        const mainContent = document.getElementById('mainContent');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const searchInput = document.getElementById('searchInput');
        const saveStatus = document.getElementById('saveStatus');
        const warningBanner = document.getElementById('warningBanner');
        const tableBody = document.getElementById('tableBody');
        const addRowBtn = document.getElementById('addRowBtn');
        const deleteBar = document.getElementById('deleteBar');
        const deleteText = document.getElementById('deleteText');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

        // Panel elements
        const panelOverlay = document.getElementById('panelOverlay');
        const panelTitle = document.getElementById('panelTitle');
        const panelClose = document.getElementById('panelClose');
        const panelError = document.getElementById('panelError');
        const panelDate = document.getElementById('panelDate');
        const panelDifficulty = document.getElementById('panelDifficulty');
        const panelCategories = document.getElementById('panelCategories');
        const panelCancel = document.getElementById('panelCancel');
        const panelSave = document.getElementById('panelSave');

        // ===== UTILITIES =====
        function getTodayString() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function getTomorrowString() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            return `${tomorrow.getFullYear()}-${String(tomorrow.getMonth() + 1).padStart(2, '0')}-${String(tomorrow.getDate()).padStart(2, '0')}`;
        }

        function normalizeDate(dateStr) {
            if (!dateStr) return '';
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
            if (dateStr.includes('T')) return dateStr.split('T')[0];
            return dateStr;
        }

        function getRowStatus(dateStr) {
            const today = getTodayString();
            const normalized = normalizeDate(dateStr);
            if (normalized === today) return 'today';
            if (normalized > today) return 'upcoming';
            return 'past';
        }

        function showStatus(text, type = '') {
            saveStatus.textContent = text;
            saveStatus.className = 'save-status ' + type;
            if (type === 'saved') {
                setTimeout(() => {
                    if (saveStatus.textContent === text) {
                        saveStatus.textContent = '';
                        saveStatus.className = 'save-status';
                    }
                }, 2000);
            }
        }

        function escapeHtml(str) {
            if (str == null) return '';
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(String(str)));
            return div.innerHTML;
        }

        // ===== AUTH =====
        function getStoredToken() {
            return sessionStorage.getItem('adminToken');
        }

        function storeToken(token) {
            sessionStorage.setItem('adminToken', token);
            adminToken = token;
        }

        function clearToken() {
            sessionStorage.removeItem('adminToken');
            adminToken = null;
        }

        async function verifyPassword(password) {
            try {
                const response = await fetch('/.netlify/functions/admin-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (!response.ok) {
                    return { valid: false };
                }

                const data = await response.json();
                return data;
            } catch (e) {
                console.error('Auth error:', e);
                return { valid: false };
            }
        }

        async function handleLogin() {
            const password = passwordInput.value;
            if (!password) {
                loginError.textContent = 'Please enter a password';
                loginError.classList.add('show');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Verifying...';
            loginError.classList.remove('show');

            const result = await verifyPassword(password);

            if (result.valid && result.token) {
                storeToken(result.token);
                loginOverlay.classList.add('hidden');
                mainContent.style.display = 'block';
                loadPuzzles();
            } else {
                loginError.textContent = 'Incorrect password';
                loginError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }

            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        }

        function handleLogout() {
            clearToken();
            mainContent.style.display = 'none';
            loginOverlay.classList.remove('hidden');
            passwordInput.value = '';
            passwordInput.focus();
            puzzles = [];
            selectedRowId = null;
        }

        // ===== API PROXY =====
        async function adminQuery(table, operation, data = null, id = null, order = null) {
            if (!adminToken) {
                throw new Error('Not authenticated');
            }

            try {
                const response = await fetch('/.netlify/functions/admin-query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ table, operation, data, id, order })
                });

                if (response.status === 401) {
                    handleLogout();
                    throw new Error('Session expired');
                }

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Query failed');
                }

                return result;
            } catch (e) {
                console.error('Query error:', e);
                throw e;
            }
        }

        // ===== DATA =====
        async function loadPuzzles() {
            try {
                const result = await adminQuery('puzzles', 'select', null, null, { column: 'date', ascending: sortAsc });
                puzzles = result.data || [];
                updateWarningBanner();
                renderTable();
            } catch (e) {
                console.error('Failed to load puzzles:', e);
                tableBody.innerHTML = '<tr><td colspan="12" class="loading">Failed to load puzzles</td></tr>';
            }
        }

        function updateWarningBanner() {
            const today = getTodayString();
            const upcoming = puzzles.filter(p => normalizeDate(p.date) > today).length;
            if (upcoming < 7) {
                warningBanner.textContent = `Warning: Only ${upcoming} day${upcoming !== 1 ? 's' : ''} of puzzles remaining`;
                warningBanner.classList.add('show');
            } else {
                warningBanner.classList.remove('show');
            }
        }

        // ===== RENDER =====
        function renderTable() {
            let filtered = puzzles;
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = puzzles.filter(p => {
                    const cats = p.categories || [];
                    const allText = [
                        p.date,
                        p.difficulty,
                        p.author_name,
                        ...cats.flatMap(c => [c.title, ...(c.words || [])])
                    ].join(' ').toLowerCase();
                    return allText.includes(term);
                });
            }

            if (filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="12" class="loading">No puzzles found</td></tr>';
                return;
            }

            const colorClasses = ['yellow', 'green', 'blue', 'purple'];
            const difficultyLabels = { easy: 'Easy', medium: 'Medium', hard: 'Hard', very_hard: 'Very Hard' };

            tableBody.innerHTML = filtered.map((puzzle, idx) => {
                const status = getRowStatus(puzzle.date);
                const cats = puzzle.categories || [{}, {}, {}, {}];
                const isSelected = puzzle.id === selectedRowId;

                // Sort categories by difficulty to ensure correct color mapping
                const sortedCats = [...cats].sort((a, b) => (a.difficulty || 1) - (b.difficulty || 1));

                return `
                    <tr class="${status} ${isSelected ? 'selected' : ''}" data-id="${escapeHtml(puzzle.id)}">
                        <td class="row-num">${idx + 1}</td>
                        <td class="date-cell">${escapeHtml(normalizeDate(puzzle.date))}</td>
                        <td class="difficulty-cell">${escapeHtml(difficultyLabels[puzzle.difficulty] || '--')}</td>
                        ${[0, 1, 2, 3].map(colorIdx => {
                            const cat = sortedCats[colorIdx] || {};
                            const words = cat.words || [];
                            const wordsStr = words.join(', ');
                            const colorClass = colorClasses[colorIdx];
                            return `
                                <td class="category-cell ${colorClass}">${escapeHtml(cat.title || '')}</td>
                                <td class="words-cell ${colorClass}">${escapeHtml(wordsStr)}</td>
                            `;
                        }).join('')}
                        <td class="author-cell">${escapeHtml(puzzle.author_name || '')}</td>
                    </tr>
                `;
            }).join('');

            attachRowListeners();
        }

        function attachRowListeners() {
            tableBody.querySelectorAll('tr[data-id]').forEach(row => {
                const id = row.dataset.id;

                // Row number click = select for delete
                row.querySelector('.row-num').addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectRow(id);
                });

                // Rest of row click = open edit panel
                row.addEventListener('click', (e) => {
                    if (e.target.classList.contains('row-num')) return;
                    openEditPanel(id);
                });
            });
        }

        // ===== ROW SELECTION (for delete) =====
        function selectRow(id) {
            if (selectedRowId === id) {
                selectedRowId = null;
                deleteBar.classList.remove('show');
            } else {
                selectedRowId = id;
                const puzzle = puzzles.find(p => p.id === id);
                if (puzzle) {
                    deleteText.textContent = `Delete puzzle for ${normalizeDate(puzzle.date)}? Cannot be undone.`;
                    deleteBar.classList.add('show');
                }
            }
            renderTable();
        }

        async function deleteSelectedRow() {
            if (!selectedRowId) return;

            showStatus('Deleting...', 'saving');

            try {
                await adminQuery('puzzles', 'delete', null, selectedRowId);

                puzzles = puzzles.filter(p => p.id !== selectedRowId);
                selectedRowId = null;
                deleteBar.classList.remove('show');

                updateWarningBanner();
                renderTable();
                showStatus('Deleted', 'saved');
            } catch (e) {
                console.error('Delete failed:', e);
                showStatus('Error deleting', 'error');
            }
        }

        // ===== EDIT PANEL =====
        const EMPTY_CATEGORIES_JSON = `[
  {"title": "", "words": ["", "", "", ""], "difficulty": 1},
  {"title": "", "words": ["", "", "", ""], "difficulty": 2},
  {"title": "", "words": ["", "", "", ""], "difficulty": 3},
  {"title": "", "words": ["", "", "", ""], "difficulty": 4}
]`;

        function openEditPanel(puzzleId) {
            editingPuzzleId = puzzleId;
            const puzzle = puzzles.find(p => p.id === puzzleId);

            if (!puzzle) return;

            panelTitle.textContent = `Edit Puzzle - ${normalizeDate(puzzle.date)}`;
            panelDate.value = normalizeDate(puzzle.date);
            panelDifficulty.value = puzzle.difficulty || '';

            // Format categories as JSON
            const cats = puzzle.categories || [];
            const sortedCats = [...cats].sort((a, b) => (a.difficulty || 1) - (b.difficulty || 1));
            const catsForJson = sortedCats.map(c => ({
                title: c.title || '',
                words: c.words || ['', '', '', ''],
                difficulty: c.difficulty || 1
            }));
            panelCategories.value = JSON.stringify(catsForJson, null, 2);

            clearPanelError();
            panelOverlay.classList.add('open');
            panelDate.focus();
        }

        function openNewPuzzlePanel() {
            editingPuzzleId = null;

            // Find next available date
            let nextDate = getTomorrowString();
            const existingDates = new Set(puzzles.map(p => normalizeDate(p.date)));
            while (existingDates.has(nextDate)) {
                const d = new Date(nextDate);
                d.setDate(d.getDate() + 1);
                nextDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            }

            panelTitle.textContent = 'Add New Puzzle';
            panelDate.value = nextDate;
            panelDifficulty.value = '';
            panelCategories.value = EMPTY_CATEGORIES_JSON;

            clearPanelError();
            panelOverlay.classList.add('open');
            panelDate.focus();
        }

        function closePanel() {
            panelOverlay.classList.remove('open');
            editingPuzzleId = null;
            clearPanelError();
        }

        function clearPanelError() {
            panelError.classList.remove('show');
            panelError.innerHTML = '';
            panelCategories.classList.remove('error');
        }

        function showPanelError(messages) {
            if (typeof messages === 'string') {
                messages = [messages];
            }

            if (messages.length === 1) {
                panelError.innerHTML = messages[0];
            } else {
                panelError.innerHTML = 'Please fix the following errors:<ul>' +
                    messages.map(m => `<li>${escapeHtml(m)}</li>`).join('') +
                    '</ul>';
            }

            panelError.classList.add('show');
            panelCategories.classList.add('error');
        }

        function validatePanelData() {
            const errors = [];
            const date = panelDate.value;
            const categoriesJson = panelCategories.value;

            // Validate date
            if (!date) {
                errors.push('Date is required');
            } else {
                // Check for duplicate date (excluding current puzzle if editing)
                const existingWithDate = puzzles.find(p =>
                    normalizeDate(p.date) === date && p.id !== editingPuzzleId
                );
                if (existingWithDate) {
                    errors.push('A puzzle already exists for this date');
                }
            }

            // Parse and validate JSON
            let categories;
            try {
                categories = JSON.parse(categoriesJson);
            } catch (e) {
                errors.push('Invalid JSON syntax: ' + e.message);
                return { valid: false, errors };
            }

            // Validate structure
            if (!Array.isArray(categories)) {
                errors.push('Categories must be an array');
                return { valid: false, errors };
            }

            if (categories.length !== 4) {
                errors.push(`Must have exactly 4 categories (found ${categories.length})`);
                return { valid: false, errors };
            }

            const allWords = [];
            const colorNames = ['Yellow (1)', 'Green (2)', 'Blue (3)', 'Purple (4)'];

            for (let i = 0; i < categories.length; i++) {
                const cat = categories[i];
                const catName = colorNames[i] || `Category ${i + 1}`;

                if (!cat.title || cat.title.trim() === '') {
                    errors.push(`${catName}: Title is required`);
                }

                if (!Array.isArray(cat.words)) {
                    errors.push(`${catName}: Words must be an array`);
                    continue;
                }

                if (cat.words.length !== 4) {
                    errors.push(`${catName}: Must have exactly 4 words (found ${cat.words.length})`);
                    continue;
                }

                for (let j = 0; j < cat.words.length; j++) {
                    const word = cat.words[j];
                    if (!word || String(word).trim() === '') {
                        errors.push(`${catName}: Word ${j + 1} is empty`);
                    } else {
                        allWords.push(String(word).trim().toUpperCase());
                    }
                }
            }

            // Check for duplicate words
            const uniqueWords = new Set(allWords);
            if (uniqueWords.size !== allWords.length) {
                const seen = {};
                const duplicates = [];
                for (const word of allWords) {
                    if (seen[word] && !duplicates.includes(word)) {
                        duplicates.push(word);
                    }
                    seen[word] = true;
                }
                errors.push(`Duplicate words found: ${duplicates.join(', ')}`);
            }

            if (errors.length > 0) {
                return { valid: false, errors };
            }

            // Process categories - uppercase words and ensure difficulty
            const processedCategories = categories.map((cat, idx) => ({
                title: cat.title.trim(),
                words: cat.words.map(w => String(w).trim().toUpperCase()),
                difficulty: cat.difficulty || (idx + 1)
            }));

            return {
                valid: true,
                data: {
                    date,
                    difficulty: panelDifficulty.value || null,
                    categories: processedCategories
                }
            };
        }

        async function handlePanelSave() {
            clearPanelError();

            const validation = validatePanelData();
            if (!validation.valid) {
                showPanelError(validation.errors);
                return;
            }

            panelSave.disabled = true;
            showStatus('Saving...', 'saving');

            try {
                if (editingPuzzleId) {
                    // Update existing
                    await adminQuery('puzzles', 'update', validation.data, editingPuzzleId);

                    const idx = puzzles.findIndex(p => p.id === editingPuzzleId);
                    if (idx !== -1) {
                        puzzles[idx] = { ...puzzles[idx], ...validation.data };
                    }
                } else {
                    // Insert new
                    const result = await adminQuery('puzzles', 'insert', validation.data);
                    puzzles.push(result.data);
                    puzzles.sort((a, b) => sortAsc
                        ? normalizeDate(a.date).localeCompare(normalizeDate(b.date))
                        : normalizeDate(b.date).localeCompare(normalizeDate(a.date))
                    );
                }

                updateWarningBanner();
                renderTable();
                showStatus('Saved', 'saved');
                closePanel();
            } catch (e) {
                console.error('Save failed:', e);
                showPanelError('Failed to save: ' + e.message);
                showStatus('Error saving', 'error');
            } finally {
                panelSave.disabled = false;
            }
        }

        // ===== EVENT LISTENERS =====
        loginBtn.addEventListener('click', handleLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        logoutBtn.addEventListener('click', handleLogout);

        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderTable();
        });

        document.querySelector('th[data-sort="date"]').addEventListener('click', () => {
            sortAsc = !sortAsc;
            puzzles.sort((a, b) => sortAsc
                ? normalizeDate(a.date).localeCompare(normalizeDate(b.date))
                : normalizeDate(b.date).localeCompare(normalizeDate(a.date))
            );
            renderTable();
        });

        addRowBtn.addEventListener('click', openNewPuzzlePanel);

        cancelDeleteBtn.addEventListener('click', () => {
            selectedRowId = null;
            deleteBar.classList.remove('show');
            renderTable();
        });
        confirmDeleteBtn.addEventListener('click', deleteSelectedRow);

        // Panel events
        panelClose.addEventListener('click', closePanel);
        panelCancel.addEventListener('click', closePanel);
        panelSave.addEventListener('click', handlePanelSave);

        panelOverlay.addEventListener('click', (e) => {
            if (e.target === panelOverlay) closePanel();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && panelOverlay.classList.contains('open')) {
                closePanel();
            }
        });

        // ===== INIT =====
        async function init() {
            const storedToken = getStoredToken();
            if (storedToken) {
                adminToken = storedToken;
                try {
                    await loadPuzzles();
                    loginOverlay.classList.add('hidden');
                    mainContent.style.display = 'block';
                } catch (e) {
                    clearToken();
                    passwordInput.focus();
                }
            } else {
                passwordInput.focus();
            }
        }

        init();
    </script>
</body>
</html>
