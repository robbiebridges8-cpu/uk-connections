<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorted. Admin</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            font-size: 13px;
        }

        /* Login */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 32px;
            width: 320px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .login-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }

        .login-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .login-input:focus {
            outline: none;
            border-color: #4285f4;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #3367d6;
        }

        .login-error {
            color: #d93025;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #ddd;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
        }

        .search-input {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            width: 200px;
        }

        .search-input:focus {
            outline: none;
            border-color: #4285f4;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .save-status {
            font-size: 12px;
            color: #666;
        }

        .save-status.saving {
            color: #f9ab00;
        }

        .save-status.saved {
            color: #34a853;
        }

        .save-status.error {
            color: #d93025;
        }

        /* Warning Banner */
        .warning-banner {
            background: #fef7e0;
            border-bottom: 1px solid #f9ab00;
            padding: 10px 16px;
            color: #b06000;
            font-weight: 500;
            display: none;
        }

        .warning-banner.show {
            display: block;
        }

        /* Spreadsheet */
        .spreadsheet-container {
            overflow: auto;
            height: calc(100vh - 100px);
        }

        table {
            border-collapse: collapse;
            width: max-content;
            min-width: 100%;
            background: white;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 0;
            height: 32px;
            white-space: nowrap;
        }

        th {
            background: #f8f9fa;
            font-weight: 500;
            text-align: left;
            padding: 8px 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Frozen columns */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            z-index: 5;
            background: #f8f9fa;
            border-right: 2px solid #ccc;
        }

        th:first-child {
            z-index: 15;
        }

        th:nth-child(2),
        td:nth-child(2) {
            position: sticky;
            left: 40px;
            z-index: 4;
            background: inherit;
            border-right: 2px solid #ccc;
        }

        th:nth-child(2) {
            z-index: 14;
            background: #f8f9fa;
        }

        /* Row number column */
        .row-num {
            width: 40px;
            min-width: 40px;
            text-align: center;
            color: #666;
            cursor: pointer;
            user-select: none;
        }

        .row-num:hover {
            background: #e8f0fe !important;
        }

        tr.selected .row-num {
            background: #4285f4 !important;
            color: white;
        }

        /* Row states */
        tr.past td {
            background: #f5f5f5;
            color: #888;
        }

        tr.today td {
            background: #fffde7;
        }

        tr.upcoming td {
            background: white;
        }

        tr.selected td {
            background: #e8f0fe !important;
        }

        /* Cells */
        td input,
        td select {
            width: 100%;
            height: 100%;
            border: none;
            padding: 6px 8px;
            font-size: 13px;
            font-family: inherit;
            background: transparent;
        }

        td input:focus,
        td select:focus {
            outline: 2px solid #4285f4;
            outline-offset: -2px;
            background: white;
        }

        td input.error,
        td select.error {
            outline: 2px solid #d93025;
            outline-offset: -2px;
        }

        td input.word {
            text-transform: uppercase;
        }

        td.date-cell {
            min-width: 120px;
        }

        td.difficulty-cell {
            min-width: 100px;
        }

        td.author-cell {
            min-width: 100px;
        }

        td.title-cell {
            min-width: 140px;
        }

        td.word-cell {
            min-width: 90px;
        }

        td.tier-cell {
            min-width: 50px;
        }

        /* Category headers */
        th.cat-header {
            text-align: center;
        }

        th.cat-1 { background: #fff9c4; }
        th.cat-2 { background: #c8e6c9; }
        th.cat-3 { background: #b3e5fc; }
        th.cat-4 { background: #e1bee7; }

        /* Delete confirmation */
        .delete-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #ddd;
            padding: 12px 16px;
            display: none;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
            z-index: 200;
        }

        .delete-bar.show {
            display: flex;
        }

        .delete-bar-text {
            color: #d93025;
            font-weight: 500;
        }

        .delete-bar-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #ddd;
            background: white;
        }

        .btn:hover {
            background: #f5f5f5;
        }

        .btn-danger {
            background: #d93025;
            color: white;
            border-color: #d93025;
        }

        .btn-danger:hover {
            background: #c5221f;
        }

        .btn-primary {
            background: #4285f4;
            color: white;
            border-color: #4285f4;
        }

        .btn-primary:hover {
            background: #3367d6;
        }

        /* Add row button */
        .add-row-container {
            padding: 8px 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .add-row-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: #f8f9fa;
            border: 1px dashed #ccc;
            border-radius: 4px;
            color: #666;
            font-size: 13px;
            cursor: pointer;
        }

        .add-row-btn:hover {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #4285f4;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h1 class="login-title">Sorted. Admin</h1>
            <input type="password" id="passwordInput" class="login-input" placeholder="Password" autofocus>
            <button id="loginBtn" class="login-btn">Login</button>
            <p id="loginError" class="login-error">Incorrect password</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" style="display: none;">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <span class="header-title">Puzzle Manager</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Search...">
            </div>
            <div class="header-right">
                <span id="saveStatus" class="save-status"></span>
            </div>
        </div>

        <!-- Warning Banner -->
        <div id="warningBanner" class="warning-banner"></div>

        <!-- Spreadsheet -->
        <div class="spreadsheet-container">
            <table id="spreadsheet">
                <thead>
                    <tr>
                        <th class="row-num">#</th>
                        <th style="cursor:pointer" data-sort="date">Date</th>
                        <th>Difficulty</th>
                        <th>Author</th>
                        <th class="cat-header cat-1">Cat 1 Title</th>
                        <th class="cat-1">W1</th>
                        <th class="cat-1">W2</th>
                        <th class="cat-1">W3</th>
                        <th class="cat-1">W4</th>
                        <th class="cat-1">Tier</th>
                        <th class="cat-header cat-2">Cat 2 Title</th>
                        <th class="cat-2">W1</th>
                        <th class="cat-2">W2</th>
                        <th class="cat-2">W3</th>
                        <th class="cat-2">W4</th>
                        <th class="cat-2">Tier</th>
                        <th class="cat-header cat-3">Cat 3 Title</th>
                        <th class="cat-3">W1</th>
                        <th class="cat-3">W2</th>
                        <th class="cat-3">W3</th>
                        <th class="cat-3">W4</th>
                        <th class="cat-3">Tier</th>
                        <th class="cat-header cat-4">Cat 4 Title</th>
                        <th class="cat-4">W1</th>
                        <th class="cat-4">W2</th>
                        <th class="cat-4">W3</th>
                        <th class="cat-4">W4</th>
                        <th class="cat-4">Tier</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="28" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Add Row -->
        <div class="add-row-container">
            <button id="addRowBtn" class="add-row-btn">+ Add puzzle</button>
        </div>

        <!-- Delete Bar -->
        <div id="deleteBar" class="delete-bar">
            <span id="deleteText" class="delete-bar-text"></span>
            <div class="delete-bar-actions">
                <button id="cancelDeleteBtn" class="btn">Cancel</button>
                <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===== STATE =====
        let db = null;
        let adminPassword = '';
        let puzzles = [];
        let selectedRowId = null;
        let sortAsc = true;
        let searchTerm = '';

        // ===== DOM =====
        const loginOverlay = document.getElementById('loginOverlay');
        const mainContent = document.getElementById('mainContent');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const searchInput = document.getElementById('searchInput');
        const saveStatus = document.getElementById('saveStatus');
        const warningBanner = document.getElementById('warningBanner');
        const tableBody = document.getElementById('tableBody');
        const addRowBtn = document.getElementById('addRowBtn');
        const deleteBar = document.getElementById('deleteBar');
        const deleteText = document.getElementById('deleteText');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

        // ===== UTILITIES =====
        function getTodayString() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function getTomorrowString() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            return `${tomorrow.getFullYear()}-${String(tomorrow.getMonth() + 1).padStart(2, '0')}-${String(tomorrow.getDate()).padStart(2, '0')}`;
        }

        function normalizeDate(dateStr) {
            if (!dateStr) return '';
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
            if (dateStr.includes('T')) return dateStr.split('T')[0];
            return dateStr;
        }

        function getRowStatus(dateStr) {
            const today = getTodayString();
            const normalized = normalizeDate(dateStr);
            if (normalized === today) return 'today';
            if (normalized > today) return 'upcoming';
            return 'past';
        }

        function showStatus(text, type = '') {
            saveStatus.textContent = text;
            saveStatus.className = 'save-status ' + type;
            if (type === 'saved') {
                setTimeout(() => {
                    if (saveStatus.textContent === text) {
                        saveStatus.textContent = '';
                        saveStatus.className = 'save-status';
                    }
                }, 2000);
            }
        }

        // ===== AUTH =====
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                db = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
                adminPassword = config.adminPassword;
                return true;
            } catch (e) {
                console.error('Failed to load config:', e);
                return false;
            }
        }

        function checkAuth() {
            return sessionStorage.getItem('adminAuth') === 'true';
        }

        function handleLogin() {
            if (passwordInput.value === adminPassword) {
                sessionStorage.setItem('adminAuth', 'true');
                loginOverlay.classList.add('hidden');
                mainContent.style.display = 'block';
                loadPuzzles();
            } else {
                loginError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        // ===== DATA =====
        async function loadPuzzles() {
            try {
                const { data, error } = await db
                    .from('puzzles')
                    .select('*')
                    .order('date', { ascending: sortAsc });

                if (error) throw error;
                puzzles = data || [];
                updateWarningBanner();
                renderTable();
            } catch (e) {
                console.error('Failed to load puzzles:', e);
                tableBody.innerHTML = '<tr><td colspan="28" class="loading">Failed to load puzzles</td></tr>';
            }
        }

        function updateWarningBanner() {
            const today = getTodayString();
            const upcoming = puzzles.filter(p => normalizeDate(p.date) > today).length;
            if (upcoming < 7) {
                warningBanner.textContent = `Warning: Only ${upcoming} day${upcoming !== 1 ? 's' : ''} of puzzles remaining`;
                warningBanner.classList.add('show');
            } else {
                warningBanner.classList.remove('show');
            }
        }

        // ===== RENDER =====
        function renderTable() {
            let filtered = puzzles;
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = puzzles.filter(p => {
                    const cats = p.categories || [];
                    const allText = [
                        p.date,
                        p.difficulty,
                        p.author_name,
                        ...cats.flatMap(c => [c.title, ...(c.words || [])])
                    ].join(' ').toLowerCase();
                    return allText.includes(term);
                });
            }

            if (filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="28" class="loading">No puzzles found</td></tr>';
                return;
            }

            tableBody.innerHTML = filtered.map((puzzle, idx) => {
                const status = getRowStatus(puzzle.date);
                const cats = puzzle.categories || [{}, {}, {}, {}];
                const isSelected = puzzle.id === selectedRowId;

                return `
                    <tr class="${status} ${isSelected ? 'selected' : ''}" data-id="${puzzle.id}">
                        <td class="row-num" onclick="selectRow('${puzzle.id}')">${idx + 1}</td>
                        <td class="date-cell">
                            <input type="date" value="${normalizeDate(puzzle.date)}" data-field="date" data-id="${puzzle.id}">
                        </td>
                        <td class="difficulty-cell">
                            <select data-field="difficulty" data-id="${puzzle.id}">
                                <option value="">--</option>
                                <option value="easy" ${puzzle.difficulty === 'easy' ? 'selected' : ''}>Easy</option>
                                <option value="medium" ${puzzle.difficulty === 'medium' ? 'selected' : ''}>Medium</option>
                                <option value="hard" ${puzzle.difficulty === 'hard' ? 'selected' : ''}>Hard</option>
                                <option value="very_hard" ${puzzle.difficulty === 'very_hard' ? 'selected' : ''}>Very Hard</option>
                            </select>
                        </td>
                        <td class="author-cell">
                            <input type="text" value="${puzzle.author_name || ''}" data-field="author_name" data-id="${puzzle.id}">
                        </td>
                        ${[0, 1, 2, 3].map(catIdx => {
                            const cat = cats[catIdx] || {};
                            const words = cat.words || ['', '', '', ''];
                            return `
                                <td class="title-cell">
                                    <input type="text" value="${cat.title || ''}" data-field="cat${catIdx}_title" data-id="${puzzle.id}">
                                </td>
                                <td class="word-cell">
                                    <input type="text" class="word" value="${words[0] || ''}" data-field="cat${catIdx}_word0" data-id="${puzzle.id}">
                                </td>
                                <td class="word-cell">
                                    <input type="text" class="word" value="${words[1] || ''}" data-field="cat${catIdx}_word1" data-id="${puzzle.id}">
                                </td>
                                <td class="word-cell">
                                    <input type="text" class="word" value="${words[2] || ''}" data-field="cat${catIdx}_word2" data-id="${puzzle.id}">
                                </td>
                                <td class="word-cell">
                                    <input type="text" class="word" value="${words[3] || ''}" data-field="cat${catIdx}_word3" data-id="${puzzle.id}">
                                </td>
                                <td class="tier-cell">
                                    <select data-field="cat${catIdx}_tier" data-id="${puzzle.id}">
                                        <option value="1" ${cat.difficulty === 1 ? 'selected' : ''}>1</option>
                                        <option value="2" ${cat.difficulty === 2 ? 'selected' : ''}>2</option>
                                        <option value="3" ${cat.difficulty === 3 ? 'selected' : ''}>3</option>
                                        <option value="4" ${cat.difficulty === 4 ? 'selected' : ''}>4</option>
                                    </select>
                                </td>
                            `;
                        }).join('')}
                    </tr>
                `;
            }).join('');

            attachCellListeners();
        }

        function attachCellListeners() {
            tableBody.querySelectorAll('input, select').forEach(el => {
                el.addEventListener('blur', handleCellChange);
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        el.blur();
                    } else if (e.key === 'Tab') {
                        // Let default tab behavior work
                    }
                });
            });
        }

        // ===== CELL EDITING =====
        async function handleCellChange(e) {
            const el = e.target;
            const id = el.dataset.id;
            const field = el.dataset.field;
            let value = el.value;

            // Auto-uppercase words
            if (el.classList.contains('word')) {
                value = value.toUpperCase();
                el.value = value;
            }

            // Build full puzzle data from row
            const row = el.closest('tr');
            const puzzleData = buildPuzzleDataFromRow(row);

            // Validate
            const validation = validatePuzzle(puzzleData, id);
            if (!validation.valid) {
                el.classList.add('error');
                showStatus(validation.error, 'error');
                return;
            }

            el.classList.remove('error');
            row.querySelectorAll('.error').forEach(e => e.classList.remove('error'));

            // Save
            await savePuzzle(id, puzzleData);
        }

        function buildPuzzleDataFromRow(row) {
            const inputs = row.querySelectorAll('input, select');
            const data = {
                date: '',
                difficulty: null,
                author_name: null,
                categories: [{}, {}, {}, {}]
            };

            inputs.forEach(input => {
                const field = input.dataset.field;
                let value = input.value;

                if (field === 'date') {
                    data.date = value;
                } else if (field === 'difficulty') {
                    data.difficulty = value || null;
                } else if (field === 'author_name') {
                    data.author_name = value || null;
                } else if (field.startsWith('cat')) {
                    const match = field.match(/cat(\d)_(\w+)(\d?)/);
                    if (match) {
                        const catIdx = parseInt(match[1]);
                        const prop = match[2];
                        const wordIdx = match[3] ? parseInt(match[3]) : null;

                        if (!data.categories[catIdx]) {
                            data.categories[catIdx] = { title: '', difficulty: catIdx + 1, words: ['', '', '', ''] };
                        }

                        if (prop === 'title') {
                            data.categories[catIdx].title = value;
                        } else if (prop === 'tier') {
                            data.categories[catIdx].difficulty = parseInt(value) || catIdx + 1;
                        } else if (prop === 'word' && wordIdx !== null) {
                            if (!data.categories[catIdx].words) {
                                data.categories[catIdx].words = ['', '', '', ''];
                            }
                            data.categories[catIdx].words[wordIdx] = value.toUpperCase();
                        }
                    }
                }
            });

            return data;
        }

        function validatePuzzle(data, currentId) {
            // Check date
            if (!data.date) {
                return { valid: false, error: 'Date is required' };
            }

            // Check date uniqueness
            const existingWithDate = puzzles.find(p => normalizeDate(p.date) === data.date && p.id !== currentId);
            if (existingWithDate) {
                return { valid: false, error: 'Date already exists' };
            }

            // Collect all words
            const allWords = [];
            for (const cat of data.categories) {
                if (cat.words) {
                    for (const word of cat.words) {
                        if (word) allWords.push(word);
                    }
                }
            }

            // Check for duplicate words
            const uniqueWords = new Set(allWords);
            if (uniqueWords.size !== allWords.length) {
                return { valid: false, error: 'Duplicate words found' };
            }

            return { valid: true };
        }

        async function savePuzzle(id, data) {
            showStatus('Saving...', 'saving');

            try {
                const { error } = await db
                    .from('puzzles')
                    .update({
                        date: data.date,
                        difficulty: data.difficulty,
                        author_name: data.author_name,
                        categories: data.categories
                    })
                    .eq('id', id);

                if (error) throw error;

                // Update local state
                const idx = puzzles.findIndex(p => p.id === id);
                if (idx !== -1) {
                    puzzles[idx] = { ...puzzles[idx], ...data };
                }

                updateWarningBanner();
                showStatus('Saved', 'saved');
            } catch (e) {
                console.error('Save failed:', e);
                showStatus('Error: ' + e.message, 'error');
            }
        }

        // ===== ROW MANAGEMENT =====
        function selectRow(id) {
            if (selectedRowId === id) {
                selectedRowId = null;
                deleteBar.classList.remove('show');
            } else {
                selectedRowId = id;
                const puzzle = puzzles.find(p => p.id === id);
                if (puzzle) {
                    deleteText.textContent = `Delete puzzle for ${normalizeDate(puzzle.date)}? Cannot be undone.`;
                    deleteBar.classList.add('show');
                }
            }
            renderTable();
        }

        async function addNewRow() {
            // Find the next available date
            let nextDate = getTomorrowString();
            const existingDates = new Set(puzzles.map(p => normalizeDate(p.date)));
            while (existingDates.has(nextDate)) {
                const d = new Date(nextDate);
                d.setDate(d.getDate() + 1);
                nextDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            }

            const newPuzzle = {
                date: nextDate,
                difficulty: null,
                author_name: null,
                categories: [
                    { title: '', difficulty: 1, words: ['', '', '', ''] },
                    { title: '', difficulty: 2, words: ['', '', '', ''] },
                    { title: '', difficulty: 3, words: ['', '', '', ''] },
                    { title: '', difficulty: 4, words: ['', '', '', ''] }
                ]
            };

            showStatus('Adding...', 'saving');

            try {
                const { data, error } = await db
                    .from('puzzles')
                    .insert(newPuzzle)
                    .select()
                    .single();

                if (error) throw error;

                puzzles.push(data);
                puzzles.sort((a, b) => sortAsc
                    ? normalizeDate(a.date).localeCompare(normalizeDate(b.date))
                    : normalizeDate(b.date).localeCompare(normalizeDate(a.date))
                );

                updateWarningBanner();
                renderTable();
                showStatus('Added', 'saved');

                // Focus the first cell of new row
                setTimeout(() => {
                    const newRow = tableBody.querySelector(`tr[data-id="${data.id}"]`);
                    if (newRow) {
                        const firstInput = newRow.querySelector('input');
                        if (firstInput) firstInput.focus();
                    }
                }, 50);
            } catch (e) {
                console.error('Add failed:', e);
                showStatus('Error: ' + e.message, 'error');
            }
        }

        async function deleteSelectedRow() {
            if (!selectedRowId) return;

            showStatus('Deleting...', 'saving');

            try {
                const { error } = await db
                    .from('puzzles')
                    .delete()
                    .eq('id', selectedRowId);

                if (error) throw error;

                puzzles = puzzles.filter(p => p.id !== selectedRowId);
                selectedRowId = null;
                deleteBar.classList.remove('show');

                updateWarningBanner();
                renderTable();
                showStatus('Deleted', 'saved');
            } catch (e) {
                console.error('Delete failed:', e);
                showStatus('Error: ' + e.message, 'error');
            }
        }

        // ===== EVENT LISTENERS =====
        loginBtn.addEventListener('click', handleLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderTable();
        });

        document.querySelector('th[data-sort="date"]').addEventListener('click', () => {
            sortAsc = !sortAsc;
            puzzles.sort((a, b) => sortAsc
                ? normalizeDate(a.date).localeCompare(normalizeDate(b.date))
                : normalizeDate(b.date).localeCompare(normalizeDate(a.date))
            );
            renderTable();
        });

        addRowBtn.addEventListener('click', addNewRow);
        cancelDeleteBtn.addEventListener('click', () => {
            selectedRowId = null;
            deleteBar.classList.remove('show');
            renderTable();
        });
        confirmDeleteBtn.addEventListener('click', deleteSelectedRow);

        // ===== INIT =====
        async function init() {
            const configLoaded = await loadConfig();
            if (!configLoaded) {
                alert('Failed to load configuration');
                return;
            }

            if (checkAuth()) {
                loginOverlay.classList.add('hidden');
                mainContent.style.display = 'block';
                loadPuzzles();
            }
        }

        init();
    </script>
</body>
</html>
