<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorted. Admin</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            font-size: 13px;
        }

        /* Login */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 32px;
            width: 320px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .login-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }

        .login-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .login-input:focus {
            outline: none;
            border-color: #4285f4;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #3367d6;
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .login-error {
            color: #d93025;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #ddd;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
        }

        .search-input {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            width: 200px;
        }

        .search-input:focus {
            outline: none;
            border-color: #4285f4;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .save-status {
            font-size: 12px;
            color: #666;
        }

        .save-status.saving {
            color: #f9ab00;
        }

        .save-status.saved {
            color: #34a853;
        }

        .save-status.error {
            color: #d93025;
        }

        .logout-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: #666;
        }

        .logout-btn:hover {
            background: #f5f5f5;
            color: #333;
        }

        /* Warning Banner */
        .warning-banner {
            background: #fef7e0;
            border-bottom: 1px solid #f9ab00;
            padding: 10px 16px;
            color: #b06000;
            font-weight: 500;
            display: none;
        }

        .warning-banner.show {
            display: block;
        }

        /* Spreadsheet */
        .spreadsheet-container {
            overflow: auto;
            height: calc(100vh - 100px);
        }

        table {
            border-collapse: collapse;
            width: max-content;
            min-width: 100%;
            background: white;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 0;
            height: 32px;
            white-space: nowrap;
        }

        th {
            background: #f8f9fa;
            font-weight: 500;
            text-align: left;
            padding: 8px 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Frozen columns */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            z-index: 5;
            background: #f8f9fa;
            border-right: 2px solid #ccc;
        }

        th:first-child {
            z-index: 15;
        }

        th:nth-child(2),
        td:nth-child(2) {
            position: sticky;
            left: 40px;
            z-index: 4;
            background: inherit;
            border-right: 2px solid #ccc;
        }

        th:nth-child(2) {
            z-index: 14;
            background: #f8f9fa;
        }

        /* Row number column */
        .row-num {
            width: 40px;
            min-width: 40px;
            text-align: center;
            color: #666;
            cursor: pointer;
            user-select: none;
        }

        .row-num:hover {
            background: #e8f0fe !important;
        }

        tr.selected .row-num {
            background: #4285f4 !important;
            color: white;
        }

        /* Row states */
        tr.past td {
            background: #f5f5f5;
            color: #888;
        }

        tr.today td {
            background: #fffde7;
        }

        tr.upcoming td {
            background: white;
        }

        tr.selected td {
            background: #e8f0fe !important;
        }

        /* Cells */
        td input,
        td select {
            width: 100%;
            height: 100%;
            border: none;
            padding: 6px 8px;
            font-size: 13px;
            font-family: inherit;
            background: transparent;
        }

        td input:focus,
        td select:focus {
            outline: 2px solid #4285f4;
            outline-offset: -2px;
            background: white;
        }

        td input.error,
        td select.error {
            outline: 2px solid #d93025;
            outline-offset: -2px;
        }

        td input.word {
            text-transform: uppercase;
        }

        td.date-cell {
            min-width: 120px;
        }

        td.difficulty-cell {
            min-width: 100px;
        }

        td.author-cell {
            min-width: 100px;
        }

        td.category-cell {
            min-width: 140px;
        }

        td.words-cell {
            min-width: 220px;
        }

        td.words-cell input {
            text-transform: uppercase;
        }

        /* Category colors */
        th.yellow, td.yellow { background: #fff9c4; }
        th.green, td.green { background: #c8e6c9; }
        th.blue, td.blue { background: #b3e5fc; }
        th.purple, td.purple { background: #e1bee7; }

        tr.past td.yellow { background: #f5f5dc; }
        tr.past td.green { background: #e0e0d0; }
        tr.past td.blue { background: #d8e8f0; }
        tr.past td.purple { background: #e8dce8; }

        tr.today td.yellow { background: #fff59d; }
        tr.today td.green { background: #a5d6a7; }
        tr.today td.blue { background: #81d4fa; }
        tr.today td.purple { background: #ce93d8; }

        /* Delete confirmation */
        .delete-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #ddd;
            padding: 12px 16px;
            display: none;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
            z-index: 200;
        }

        .delete-bar.show {
            display: flex;
        }

        .delete-bar-text {
            color: #d93025;
            font-weight: 500;
        }

        .delete-bar-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #ddd;
            background: white;
        }

        .btn:hover {
            background: #f5f5f5;
        }

        .btn-danger {
            background: #d93025;
            color: white;
            border-color: #d93025;
        }

        .btn-danger:hover {
            background: #c5221f;
        }

        .btn-primary {
            background: #4285f4;
            color: white;
            border-color: #4285f4;
        }

        .btn-primary:hover {
            background: #3367d6;
        }

        /* Add row button */
        .add-row-container {
            padding: 8px 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .add-row-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: #f8f9fa;
            border: 1px dashed #ccc;
            border-radius: 4px;
            color: #666;
            font-size: 13px;
            cursor: pointer;
        }

        .add-row-btn:hover {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #4285f4;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h1 class="login-title">Sorted. Admin</h1>
            <input type="password" id="passwordInput" class="login-input" placeholder="Password" autofocus>
            <button id="loginBtn" class="login-btn">Login</button>
            <p id="loginError" class="login-error">Incorrect password</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" style="display: none;">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <span class="header-title">Puzzle Manager</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Search...">
            </div>
            <div class="header-right">
                <span id="saveStatus" class="save-status"></span>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>

        <!-- Warning Banner -->
        <div id="warningBanner" class="warning-banner"></div>

        <!-- Spreadsheet -->
        <div class="spreadsheet-container">
            <table id="spreadsheet">
                <thead>
                    <tr>
                        <th class="row-num">#</th>
                        <th style="cursor:pointer" data-sort="date">Date</th>
                        <th>Difficulty</th>
                        <th class="yellow">Yellow Category</th>
                        <th class="yellow">Yellow Words</th>
                        <th class="green">Green Category</th>
                        <th class="green">Green Words</th>
                        <th class="blue">Blue Category</th>
                        <th class="blue">Blue Words</th>
                        <th class="purple">Purple Category</th>
                        <th class="purple">Purple Words</th>
                        <th>Author</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="12" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Add Row -->
        <div class="add-row-container">
            <button id="addRowBtn" class="add-row-btn">+ Add puzzle</button>
        </div>

        <!-- Delete Bar -->
        <div id="deleteBar" class="delete-bar">
            <span id="deleteText" class="delete-bar-text"></span>
            <div class="delete-bar-actions">
                <button id="cancelDeleteBtn" class="btn">Cancel</button>
                <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <script>
        // ===== DEBUG =====
        const DEBUG = false;
        function debugLog(...args) { if (DEBUG) console.log(...args); }

        // ===== STATE =====
        let adminToken = null;
        let puzzles = [];
        let selectedRowId = null;
        let sortAsc = true;
        let searchTerm = '';

        // ===== DOM =====
        const loginOverlay = document.getElementById('loginOverlay');
        const mainContent = document.getElementById('mainContent');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const searchInput = document.getElementById('searchInput');
        const saveStatus = document.getElementById('saveStatus');
        const warningBanner = document.getElementById('warningBanner');
        const tableBody = document.getElementById('tableBody');
        const addRowBtn = document.getElementById('addRowBtn');
        const deleteBar = document.getElementById('deleteBar');
        const deleteText = document.getElementById('deleteText');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

        // ===== UTILITIES =====
        function getTodayString() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function getTomorrowString() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            return `${tomorrow.getFullYear()}-${String(tomorrow.getMonth() + 1).padStart(2, '0')}-${String(tomorrow.getDate()).padStart(2, '0')}`;
        }

        function normalizeDate(dateStr) {
            if (!dateStr) return '';
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
            if (dateStr.includes('T')) return dateStr.split('T')[0];
            return dateStr;
        }

        function getRowStatus(dateStr) {
            const today = getTodayString();
            const normalized = normalizeDate(dateStr);
            if (normalized === today) return 'today';
            if (normalized > today) return 'upcoming';
            return 'past';
        }

        function showStatus(text, type = '') {
            saveStatus.textContent = text;
            saveStatus.className = 'save-status ' + type;
            if (type === 'saved') {
                setTimeout(() => {
                    if (saveStatus.textContent === text) {
                        saveStatus.textContent = '';
                        saveStatus.className = 'save-status';
                    }
                }, 2000);
            }
        }

        // ===== AUTH =====
        function getStoredToken() {
            return sessionStorage.getItem('adminToken');
        }

        function storeToken(token) {
            sessionStorage.setItem('adminToken', token);
            adminToken = token;
        }

        function clearToken() {
            sessionStorage.removeItem('adminToken');
            adminToken = null;
        }

        async function verifyPassword(password) {
            try {
                const response = await fetch('/api/admin/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (!response.ok) {
                    return { valid: false };
                }

                const data = await response.json();
                return data;
            } catch (e) {
                console.error('Auth error:', e);
                return { valid: false };
            }
        }

        async function handleLogin() {
            const password = passwordInput.value;
            if (!password) {
                loginError.textContent = 'Please enter a password';
                loginError.classList.add('show');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Verifying...';
            loginError.classList.remove('show');

            const result = await verifyPassword(password);

            if (result.valid && result.token) {
                storeToken(result.token);
                loginOverlay.classList.add('hidden');
                mainContent.style.display = 'block';
                loadPuzzles();
            } else {
                loginError.textContent = 'Incorrect password';
                loginError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }

            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        }

        function handleLogout() {
            clearToken();
            mainContent.style.display = 'none';
            loginOverlay.classList.remove('hidden');
            passwordInput.value = '';
            passwordInput.focus();
            puzzles = [];
            selectedRowId = null;
        }

        // ===== API PROXY =====
        async function adminQuery(table, operation, data = null, id = null, order = null) {
            if (!adminToken) {
                throw new Error('Not authenticated');
            }

            try {
                const response = await fetch('/api/admin/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ table, operation, data, id, order })
                });

                if (response.status === 401) {
                    // Token expired, force re-login
                    handleLogout();
                    throw new Error('Session expired');
                }

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Query failed');
                }

                return result;
            } catch (e) {
                console.error('Query error:', e);
                throw e;
            }
        }

        // ===== DATA =====
        async function loadPuzzles() {
            try {
                const result = await adminQuery('puzzles', 'select', null, null, { column: 'date', ascending: sortAsc });
                puzzles = result.data || [];
                updateWarningBanner();
                renderTable();
            } catch (e) {
                console.error('Failed to load puzzles:', e);
                tableBody.innerHTML = '<tr><td colspan="12" class="loading">Failed to load puzzles</td></tr>';
            }
        }

        function updateWarningBanner() {
            const today = getTodayString();
            const upcoming = puzzles.filter(p => normalizeDate(p.date) > today).length;
            if (upcoming < 7) {
                warningBanner.textContent = `Warning: Only ${upcoming} day${upcoming !== 1 ? 's' : ''} of puzzles remaining`;
                warningBanner.classList.add('show');
            } else {
                warningBanner.classList.remove('show');
            }
        }

        // ===== RENDER =====
        function escapeHtml(str) {
            if (str == null) return '';
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(String(str)));
            return div.innerHTML;
        }

        function renderTable() {
            let filtered = puzzles;
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = puzzles.filter(p => {
                    const cats = p.categories || [];
                    const allText = [
                        p.date,
                        p.difficulty,
                        p.author_name,
                        ...cats.flatMap(c => [c.title, ...(c.words || [])])
                    ].join(' ').toLowerCase();
                    return allText.includes(term);
                });
            }

            if (filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="12" class="loading">No puzzles found</td></tr>';
                return;
            }

            // Color mapping: index 0=yellow(tier1), 1=green(tier2), 2=blue(tier3), 3=purple(tier4)
            const colorClasses = ['yellow', 'green', 'blue', 'purple'];

            tableBody.innerHTML = filtered.map((puzzle, idx) => {
                const status = getRowStatus(puzzle.date);
                const cats = puzzle.categories || [{}, {}, {}, {}];
                const isSelected = puzzle.id === selectedRowId;

                // Sort categories by difficulty/tier to ensure correct color mapping
                const sortedCats = [...cats].sort((a, b) => (a.difficulty || 1) - (b.difficulty || 1));

                return `
                    <tr class="${status} ${isSelected ? 'selected' : ''}" data-id="${escapeHtml(puzzle.id)}">
                        <td class="row-num" onclick="selectRow('${escapeHtml(puzzle.id)}')">${idx + 1}</td>
                        <td class="date-cell">
                            <input type="date" value="${escapeHtml(normalizeDate(puzzle.date))}" data-field="date" data-id="${escapeHtml(puzzle.id)}">
                        </td>
                        <td class="difficulty-cell">
                            <select data-field="difficulty" data-id="${escapeHtml(puzzle.id)}">
                                <option value="">--</option>
                                <option value="easy" ${puzzle.difficulty === 'easy' ? 'selected' : ''}>Easy</option>
                                <option value="medium" ${puzzle.difficulty === 'medium' ? 'selected' : ''}>Medium</option>
                                <option value="hard" ${puzzle.difficulty === 'hard' ? 'selected' : ''}>Hard</option>
                                <option value="very_hard" ${puzzle.difficulty === 'very_hard' ? 'selected' : ''}>Very Hard</option>
                            </select>
                        </td>
                        ${[0, 1, 2, 3].map(colorIdx => {
                            const cat = sortedCats[colorIdx] || {};
                            const words = cat.words || [];
                            const wordsStr = words.join(', ');
                            const colorClass = colorClasses[colorIdx];
                            return `
                                <td class="category-cell ${colorClass}">
                                    <input type="text" value="${escapeHtml(cat.title || '')}" data-field="${colorClass}_title" data-id="${escapeHtml(puzzle.id)}">
                                </td>
                                <td class="words-cell ${colorClass}">
                                    <input type="text" value="${escapeHtml(wordsStr)}" data-field="${colorClass}_words" data-id="${escapeHtml(puzzle.id)}" placeholder="WORD1, WORD2, WORD3, WORD4">
                                </td>
                            `;
                        }).join('')}
                        <td class="author-cell">
                            <input type="text" value="${escapeHtml(puzzle.author_name || '')}" data-field="author_name" data-id="${escapeHtml(puzzle.id)}">
                        </td>
                    </tr>
                `;
            }).join('');

            attachCellListeners();
        }

        function attachCellListeners() {
            tableBody.querySelectorAll('input, select').forEach(el => {
                el.addEventListener('blur', handleCellChange);
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        el.blur();
                    }
                });
            });
        }

        // ===== CELL EDITING =====
        async function handleCellChange(e) {
            const el = e.target;
            const id = el.dataset.id;
            const field = el.dataset.field;
            let value = el.value;

            // Handle words cells specially
            if (field.endsWith('_words')) {
                const words = value.split(',').map(w => w.trim().toUpperCase()).filter(w => w);

                if (words.length !== 4 && words.length !== 0) {
                    el.classList.add('error');
                    showStatus('Each category needs exactly 4 words', 'error');
                    return;
                }

                el.value = words.join(', ');
            }

            const row = el.closest('tr');
            const puzzleData = buildPuzzleDataFromRow(row);

            const validation = validatePuzzle(puzzleData, id);
            if (!validation.valid) {
                el.classList.add('error');
                showStatus(validation.error, 'error');
                return;
            }

            el.classList.remove('error');
            row.querySelectorAll('.error').forEach(e => e.classList.remove('error'));

            await savePuzzle(id, puzzleData);
        }

        function buildPuzzleDataFromRow(row) {
            const inputs = row.querySelectorAll('input, select');
            const data = {
                date: '',
                difficulty: null,
                author_name: null,
                categories: [
                    { title: '', difficulty: 1, words: [] },
                    { title: '', difficulty: 2, words: [] },
                    { title: '', difficulty: 3, words: [] },
                    { title: '', difficulty: 4, words: [] }
                ]
            };

            const colorToIdx = { yellow: 0, green: 1, blue: 2, purple: 3 };

            inputs.forEach(input => {
                const field = input.dataset.field;
                let value = input.value;

                if (field === 'date') {
                    data.date = value;
                } else if (field === 'difficulty') {
                    data.difficulty = value || null;
                } else if (field === 'author_name') {
                    data.author_name = value || null;
                } else if (field.endsWith('_title')) {
                    const color = field.replace('_title', '');
                    const idx = colorToIdx[color];
                    if (idx !== undefined) {
                        data.categories[idx].title = value;
                    }
                } else if (field.endsWith('_words')) {
                    const color = field.replace('_words', '');
                    const idx = colorToIdx[color];
                    if (idx !== undefined) {
                        const words = value.split(',').map(w => w.trim().toUpperCase()).filter(w => w);
                        data.categories[idx].words = words;
                    }
                }
            });

            return data;
        }

        function validatePuzzle(data, currentId) {
            if (!data.date) {
                return { valid: false, error: 'Date is required' };
            }

            const existingWithDate = puzzles.find(p => normalizeDate(p.date) === data.date && p.id !== currentId);
            if (existingWithDate) {
                return { valid: false, error: 'Date already exists' };
            }

            const allWords = [];
            const colorNames = ['Yellow', 'Green', 'Blue', 'Purple'];
            for (let i = 0; i < data.categories.length; i++) {
                const cat = data.categories[i];
                const words = cat.words || [];

                if (words.length > 0 && words.length !== 4) {
                    return { valid: false, error: `${colorNames[i]} needs exactly 4 words` };
                }

                for (const word of words) {
                    if (word) allWords.push(word);
                }
            }

            const uniqueWords = new Set(allWords);
            if (uniqueWords.size !== allWords.length) {
                return { valid: false, error: 'Duplicate words found' };
            }

            return { valid: true };
        }

        async function savePuzzle(id, data) {
            showStatus('Saving...', 'saving');

            try {
                await adminQuery('puzzles', 'update', {
                    date: data.date,
                    difficulty: data.difficulty,
                    author_name: data.author_name,
                    categories: data.categories
                }, id);

                const idx = puzzles.findIndex(p => p.id === id);
                if (idx !== -1) {
                    puzzles[idx] = { ...puzzles[idx], ...data };
                }

                updateWarningBanner();
                showStatus('Saved', 'saved');
            } catch (e) {
                console.error('Save failed:', e);
                showStatus('Error saving', 'error');
            }
        }

        // ===== ROW MANAGEMENT =====
        function selectRow(id) {
            if (selectedRowId === id) {
                selectedRowId = null;
                deleteBar.classList.remove('show');
            } else {
                selectedRowId = id;
                const puzzle = puzzles.find(p => p.id === id);
                if (puzzle) {
                    deleteText.textContent = `Delete puzzle for ${normalizeDate(puzzle.date)}? Cannot be undone.`;
                    deleteBar.classList.add('show');
                }
            }
            renderTable();
        }
        window.selectRow = selectRow;

        async function addNewRow() {
            let nextDate = getTomorrowString();
            const existingDates = new Set(puzzles.map(p => normalizeDate(p.date)));
            while (existingDates.has(nextDate)) {
                const d = new Date(nextDate);
                d.setDate(d.getDate() + 1);
                nextDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            }

            const newPuzzle = {
                date: nextDate,
                difficulty: null,
                author_name: null,
                categories: [
                    { title: '', difficulty: 1, words: ['', '', '', ''] },
                    { title: '', difficulty: 2, words: ['', '', '', ''] },
                    { title: '', difficulty: 3, words: ['', '', '', ''] },
                    { title: '', difficulty: 4, words: ['', '', '', ''] }
                ]
            };

            showStatus('Adding...', 'saving');

            try {
                const result = await adminQuery('puzzles', 'insert', newPuzzle);
                const data = result.data;

                puzzles.push(data);
                puzzles.sort((a, b) => sortAsc
                    ? normalizeDate(a.date).localeCompare(normalizeDate(b.date))
                    : normalizeDate(b.date).localeCompare(normalizeDate(a.date))
                );

                updateWarningBanner();
                renderTable();
                showStatus('Added', 'saved');

                setTimeout(() => {
                    const newRow = tableBody.querySelector(`tr[data-id="${data.id}"]`);
                    if (newRow) {
                        const firstInput = newRow.querySelector('input');
                        if (firstInput) firstInput.focus();
                    }
                }, 50);
            } catch (e) {
                console.error('Add failed:', e);
                showStatus('Error adding', 'error');
            }
        }

        async function deleteSelectedRow() {
            if (!selectedRowId) return;

            showStatus('Deleting...', 'saving');

            try {
                await adminQuery('puzzles', 'delete', null, selectedRowId);

                puzzles = puzzles.filter(p => p.id !== selectedRowId);
                selectedRowId = null;
                deleteBar.classList.remove('show');

                updateWarningBanner();
                renderTable();
                showStatus('Deleted', 'saved');
            } catch (e) {
                console.error('Delete failed:', e);
                showStatus('Error deleting', 'error');
            }
        }

        // ===== EVENT LISTENERS =====
        loginBtn.addEventListener('click', handleLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        logoutBtn.addEventListener('click', handleLogout);

        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderTable();
        });

        document.querySelector('th[data-sort="date"]').addEventListener('click', () => {
            sortAsc = !sortAsc;
            puzzles.sort((a, b) => sortAsc
                ? normalizeDate(a.date).localeCompare(normalizeDate(b.date))
                : normalizeDate(b.date).localeCompare(normalizeDate(a.date))
            );
            renderTable();
        });

        addRowBtn.addEventListener('click', addNewRow);
        cancelDeleteBtn.addEventListener('click', () => {
            selectedRowId = null;
            deleteBar.classList.remove('show');
            renderTable();
        });
        confirmDeleteBtn.addEventListener('click', deleteSelectedRow);

        // ===== INIT =====
        async function init() {
            // Check for existing session
            const storedToken = getStoredToken();
            if (storedToken) {
                adminToken = storedToken;
                // Verify token is still valid by trying to load puzzles
                try {
                    await loadPuzzles();
                    loginOverlay.classList.add('hidden');
                    mainContent.style.display = 'block';
                } catch (e) {
                    // Token invalid, show login
                    clearToken();
                    passwordInput.focus();
                }
            } else {
                passwordInput.focus();
            }
        }

        init();
    </script>
</body>
</html>
